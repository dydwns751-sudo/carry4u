<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루공 - Lugong</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        /* 모바일 화면 규격(390px) 시뮬레이터 스타일 */
        .phone-container {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background-color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="phone-container relative flex flex-col overflow-x-hidden">
        
        <div id="auth-screen" class="flex-1 flex flex-col justify-between p-6 bg-white">
            <div class="flex-1 flex flex-col justify-center">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-black text-white text-3xl mb-3 shadow-md shadow-gray-300">
                        <i class="fa-solid fa-route"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">루공</h1>
                    <p class="text-sm text-gray-500 mt-1">대학 캠퍼스 기반 하이퍼로컬 동선 공유</p>
                </div>

                <div class="space-y-5">
                    <h2 class="text-lg font-bold text-gray-800">캠퍼스 인증 후 시작하기</h2>
                    
                    <div class="flex bg-gray-100 p-1 rounded-xl">
                        <button type="button" id="tab-student" onclick="selectRole('student')" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-black shadow-sm transition-all">
                            대학생 인증
                        </button>
                        <button type="button" id="tab-worker" onclick="selectRole('worker')" class="flex-1 py-2.5 text-sm font-medium text-gray-500 hover:text-gray-700 transition-all">
                            직장인 인증
                        </button>
                    </div>

                    <div class="space-y-1">
                        <label id="email-label" class="text-xs font-semibold text-gray-500">학교 이메일 주소</label>
                        <input type="email" id="email-input" placeholder="example@univ.ac.kr" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all placeholder:text-gray-300 text-sm">
                    </div>

                    <button type="button" onclick="startAuth()" class="w-full bg-black hover:bg-gray-800 text-white font-medium py-3.5 rounded-xl transition-all shadow-md shadow-gray-200 flex justify-center items-center gap-2 text-sm">
                        <span>인증 요청</span>
                    </button>
                </div>
            </div>

            <div id="loading-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col justify-center items-center z-50">
                <div class="w-12 h-12 border-4 border-black border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-sm font-medium text-gray-800">안전한 신원 인증을 진행 중입니다...</p>
                <p class="text-xs text-gray-400 mt-1">잠시만 기다려주세요 (3초)</p>
            </div>
        </div>

        <div id="main-screen" class="hidden flex-1 flex flex-col bg-gray-50 pb-8">
            <header class="bg-white border-b border-gray-100 px-4 py-3 flex justify-between items-center sticky top-0 z-40">
                <span class="text-lg font-bold text-gray-900 tracking-tight">루공</span>
                <span id="user-badge" class="text-xs bg-gray-900 text-white font-medium px-2.5 py-1 rounded-full">대학생 회원</span>
            </header>

            <main class="flex-1 p-4 space-y-4 overflow-y-auto">
                
                <button type="button" onclick="openRouteModal()" class="w-full bg-gray-900 hover:bg-black text-white p-4 rounded-2xl shadow-sm text-left transition-all relative overflow-hidden group">
                    <div class="relative z-10">
                        <span class="text-[10px] bg-white/20 text-white px-2 py-0.5 rounded font-medium">어차피 이동한다면?</span>
                        <h3 class="text-base font-bold mt-1.5 flex items-center gap-1.5">
                            내 동선 등록하기 <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                        </h3>
                        <p class="text-xs text-gray-300 mt-0.5">이동 경로를 등록하고 쏠쏠한 교통비 리워드를 받으세요</p>
                    </div>
                    <i class="fa-solid fa-route absolute right-4 bottom-[-10px] text-7xl text-white/5 tracking-tighter"></i>
                </button>

                <div class="pt-2">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">배송 요청하기</h3>
                </div>

                <div class="flex bg-white border border-gray-200/60 p-1 rounded-xl">
                    <button type="button" id="btn-tab-a" onclick="switchMainTab('A')" class="flex-1 py-2 text-xs font-bold rounded-lg bg-gray-900 text-white shadow-sm transition-all">
                        캠퍼스 안심 직송
                    </button>
                    <button type="button" id="btn-tab-b" onclick="switchMainTab('B')" class="flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700 transition-all">
                        우리동네 즉시 심부름
                    </button>
                </div>

                <div id="contents-tab-a" class="bg-white rounded-2xl p-4 border border-gray-100 space-y-3.5 shadow-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-500">출발 거점</label>
                            <input type="text" placeholder="예: 정문 코인라커" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-500">도착 거점</label>
                            <input type="text" placeholder="예: 경영관 사물함" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">물품 종류</label>
                        <select class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm bg-white text-gray-700">
                            <option value="">선택해주세요</option>
                            <option value="document">전공서적 / 서류</option>
                            <option value="electronics">노트북 / 전자기기</option>
                            <option value="clothing">의류 / 잡화</option>
                            <option value="other">기타 소형 물품</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">제안 리워드 금액 (원)</label>
                        <input type="number" placeholder="예: 4000" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                    </div>
                    <button type="button" onclick="alert('직송 요청서가 등록되었습니다!')" class="w-full bg-gray-900 hover:bg-black text-white font-medium py-3 rounded-xl transition-all text-sm mt-2">
                        안심 직송 요청서 등록
                    </button>
                </div>

                <div id="contents-tab-b" class="hidden bg-white rounded-2xl p-4 border border-gray-100 space-y-3.5 shadow-sm">
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">어디서 가져올까요? (출발지)</label>
                        <input type="text" placeholder="예: 정문 앞 컴포즈커피" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">어디로 가져다줄까요? (도착지)</label>
                        <input type="text" placeholder="예: 인문관 3층 과방 앞" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">요청 내용</label>
                        <textarea rows="2" placeholder="예: 아메리카노 한 잔 픽업해서 가져다주실 분 구해요!" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm resize-none"></textarea>
                    </div>
                    <button type="button" onclick="alert('동네 심부름 요청이 등록되었습니다!')" class="w-full bg-gray-900 hover:bg-black text-white font-medium py-3 rounded-xl transition-all text-sm mt-2">
                        즉시 심부름 요청 등록
                    </button>
                </div>

                <div class="pt-4 space-y-2.5">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">실시간 배송 미션 리스트</h3>
                    
                    <div id="mission-1" class="bg-white border border-gray-200/80 rounded-2xl p-4 flex justify-between items-center shadow-sm transition-all">
                        <div class="space-y-1">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[10px] bg-gray-100 text-gray-800 border border-gray-200 font-bold px-1.5 py-0.5 rounded">캠퍼스직송</span>
                                <span class="text-xs font-bold text-gray-800">정문 라커 <i class="fa-solid fa-arrow-right text-[10px] text-gray-400 mx-0.5"></i> 경영관 사물함</span>
                            </div>
                            <p class="text-xs text-gray-500 flex items-center gap-1"><i class="fa-solid fa-book text-[10px]"></i> 물품: 전공서적</p>
                            <p class="text-sm font-bold text-gray-900">4,000원</p>
                        </div>
                        <button type="button" onclick="acceptMission('mission-1', 4000)" class="btn-delivery bg-gray-900 hover:bg-black text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition-all shadow-sm">
                            배송하기
                        </button>
                    </div>

                    <div id="mission-2" class="bg-white border border-gray-200/80 rounded-2xl p-4 flex justify-between items-center shadow-sm transition-all">
                        <div class="space-y-1">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[10px] bg-gray-100 text-gray-600 border border-gray-200 font-bold px-1.5 py-0.5 rounded">우리동네</span>
                                <span class="text-xs font-bold text-gray-800">정문 앞 커피숍 <i class="fa-solid fa-arrow-right text-[10px] text-gray-400 mx-0.5"></i> 인문관 과방</span>
                            </div>
                            <p class="text-xs text-gray-500 flex items-center gap-1"><i class="fa-solid fa-mug-hot text-[10px]"></i> 물품: 아메리카노</p>
                            <p class="text-sm font-bold text-gray-900">2,000원</p>
                        </div>
                        <button type="button" onclick="acceptMission('mission-2', 2000)" class="btn-delivery bg-gray-900 hover:bg-black text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition-all shadow-sm">
                            배송하기
                        </button>
                    </div>

                </div>

            </main>
        </div>

        <div id="route-modal" class="hidden fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4">
            <div class="bg-white w-full max-w-[350px] rounded-2xl p-5 space-y-4 shadow-xl">
                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                    <h3 class="text-base font-bold text-gray-900"><i class="fa-solid fa-route text-black mr-1"></i> 내 동선 등록</h3>
                    <button type="button" onclick="closeRouteModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                
                <div class="space-y-3">
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">출발지 (기점)</label>
                        <input type="text" id="modal-start" placeholder="예: 중도 사물함" class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-500">목적지 (귀가촌)</label>
                        <input type="text" id="modal-end" placeholder="예: 정문 앞 자취촌" class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-black text-sm">
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeRouteModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-2.5 rounded-xl transition-all text-xs">취소</button>
                    <button type="button" onclick="submitRoute()" class="flex-1 bg-gray-900 hover:bg-black text-white font-medium py-2.5 rounded-xl transition-all text-xs shadow-md">동선 등록 완료</button>
                </div>
            </div>
        </div>

    </div>
    <script>
        let currentRole = 'student';

        // 1. 신원 인증화면 내 토글 함수 (모노톤 스타일로 클래스 변경)
        function selectRole(role) {
            currentRole = role;
            const tabStudent = document.getElementById('tab-student');
            const tabWorker = document.getElementById('tab-worker');
            const emailLabel = document.getElementById('email-label');
            const emailInput = document.getElementById('email-input');

            if (role === 'student') {
                tabStudent.className = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-black shadow-sm transition-all";
                tabWorker.className = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700 transition-all";
                emailLabel.innerText = "학교 이메일 주소";
                emailInput.placeholder = "example@univ.ac.kr";
            } else {
                tabStudent.className = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700 transition-all";
                tabWorker.className = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-black shadow-sm transition-all";
                emailLabel.innerText = "회사 이메일 주소";
                emailInput.placeholder = "example@company.com";
            }
        }

        // 2. 가상 인증 및 3초 애니메이션 제어 함수
        function startAuth() {
            const emailInput = document.getElementById('email-input').value;
            if(!emailInput) {
                alert('이메일 주소를 입력해 주세요.');
                return;
            }

            const loadingOverlay = document.getElementById('loading-overlay');
            loadingOverlay.classList.remove('hidden');

            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
                
                const userBadge = document.getElementById('user-badge');
                const roleText = currentRole === 'student' ? '대학생 회원' : '직장인 회원';
                userBadge.innerText = roleText;
                
                alert(`인증이 완료되었습니다. 루공의 [${roleText}] 등급입니다.`);
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
            }, 3000);
        }

        // 3. 메인 화면 내 탭 A / 탭 B 토글 기능
        function switchMainTab(tab) {
            const btnTabA = document.getElementById('btn-tab-a');
            const btnTabB = document.getElementById('btn-tab-b');
            const contentsTabA = document.getElementById('contents-tab-a');
            const contentsTabB = document.getElementById('contents-tab-b');

            const activeClass = "flex-1 py-2 text-xs font-bold rounded-lg bg-gray-900 text-white shadow-sm transition-all";
            const inactiveClass = "flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700 transition-all";

            if(tab === 'A') {
                btnTabA.className = activeClass;
                btnTabB.className = inactiveClass;
                contentsTabA.classList.remove('hidden');
                contentsTabB.classList.add('hidden');
            } else {
                btnTabA.className = inactiveClass;
                btnTabB.className = activeClass;
                contentsTabA.classList.add('hidden');
                contentsTabB.classList.remove('hidden');
            }
        }

        // 4. 동선 등록 모달 열기/닫기
        function openRouteModal() {
            document.getElementById('route-modal').classList.remove('hidden');
        }
        function closeRouteModal() {
            document.getElementById('route-modal').classList.add('hidden');
            document.getElementById('modal-start').value = '';
            document.getElementById('modal-end').value = '';
        }

        // 5. 동선 등록 완료 프로세스
        function submitRoute() {
            const start = document.getElementById('modal-start').value;
            const end = document.getElementById('modal-end').value;
            
            if(!start || !end) {
                alert('출발지와 목적지를 모두 입력해 주세요.');
                return;
            }

            alert(`용준님의 매칭 최적화 동선이 등록되었습니다. 경로 상의 캠퍼스 미션을 확인하세요!`);
            closeRouteModal();
        }

        // 6. 미션 수락 및 가상 정산 프로세스 (모노톤 스타일 인디케이터 반영)
        function acceptMission(missionId, reward) {
            const isConfirmed = confirm(`배송 미션을 수락하시겠습니까?\n(신뢰 안심 보증금 5,000포인트가 가차감됩니다)`);
            
            if (!isConfirmed) return;

            const missionCard = document.getElementById(missionId);
            const actionButton = missionCard.querySelector('.btn-delivery');

            // 배송 중 상태로 UI 변경 (그레이 톤 어둡게 처리)
            missionCard.classList.replace('bg-white', 'bg-gray-100');
            missionCard.classList.add('border-gray-400');
            actionButton.disabled = true;
            actionButton.className = "btn-delivery bg-gray-500 text-white text-xs font-semibold px-3 py-2.5 rounded-xl cursor-not-allowed";
            actionButton.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1"></i> 배송 중`;

            // 3초 후 배송 완료 및 정산 시뮬레이션
            setTimeout(() => {
                actionButton.className = "btn-delivery bg-gray-200 text-gray-400 text-xs font-semibold px-3 py-2.5 rounded-xl cursor-not-allowed";
                actionButton.innerHTML = `<i class="fa-solid fa-check mr-1"></i> 완료`;
                missionCard.classList.replace('bg-gray-100', 'bg-gray-50');
                missionCard.classList.replace('border-gray-400', 'border-gray-200');

                alert(`정상 완료되었습니다! 루공 배송 리워드 ${reward.toLocaleString()}원이 용준님의 계정으로 정산되었습니다.`);
            }, 3000);
        }
    </script>
</body>
</html>
